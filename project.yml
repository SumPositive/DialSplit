name: DialSplit
options:
  bundleIdPrefix: com.azukid
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  AZDial:
    url: https://github.com/SumPositive/AZDial
    from: 3.0.0
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: 12.0.0

targets:
  DialSplit:
    type: application
    platform: iOS
    sources:
      - DialSplit
    resources:
      - path: DialSplit/Resources
        optional: true
    dependencies:
      - package: AZDial
        product: AZDial
      - package: GoogleMobileAds
        product: GoogleMobileAds
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.azukid.DialSplit
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: DialSplit/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
